<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Savora brings dependable recipes, smart shopping lists, and calm guided cooking into one kitchen companion.">
  <meta name="theme-color" content="#315C4C">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Savora">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <style>
    html,
    body {
      height: 100%;
      margin: 0;
      background: #f8f3e9;
    }

    #app-loading {
      position: fixed;
      inset: 0;
      z-index: 999999;
      display: grid;
      place-items: center;
      background: #f8f3e9;
      color: #315c4c;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .app-loading__content {
      display: grid;
      justify-items: center;
      gap: 18px;
    }

    .app-loading__mark {
      display: grid;
      width: 64px;
      height: 64px;
      place-items: center;
      border-radius: 20px;
      background: #315c4c;
      color: white;
      font-size: 32px;
    }

    .app-loading__name {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: 0.22em;
    }

    .app-loading__spinner {
      width: 22px;
      height: 22px;
      border: 3px solid rgb(49 92 76 / 22%);
      border-top-color: #315c4c;
      border-radius: 50%;
      animation: app-loading-spin 0.8s linear infinite;
    }

    @keyframes app-loading-spin {
      to { transform: rotate(360deg); }
    }

    @media (prefers-reduced-motion: reduce) {
      .app-loading__spinner { animation-duration: 1.8s; }
    }
  </style>

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Savora — Cook with confidence</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <div id="app-loading" role="status" aria-live="polite">
    <div class="app-loading__content">
      <div class="app-loading__mark" aria-hidden="true">♨</div>
      <div class="app-loading__name">SAVORA</div>
      <div class="app-loading__spinner" aria-hidden="true"></div>
      <span id="app-loading-status">Preparing your kitchen…</span>
    </div>
  </div>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
